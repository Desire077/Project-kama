$kind: http-request
name: Admin Login
method: POST
url: '{{baseUrl}}/api/auth/admin/login'
order: 5000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@kama.com",
      "password": "AdminPassword123!"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success property", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('success', true);
      });

      pm.test("Response contains admin token", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('token');
          if (jsonData.token) {
              pm.collectionVariables.set("adminToken", jsonData.token);
              console.log("Admin token saved successfully");
          }
      });

      pm.test("User has admin role", function () {
          const jsonData = pm.response.json();
          if (jsonData.data && jsonData.data.role) {
              pm.expect(jsonData.data.role).to.equal('admin');
          }
      });
