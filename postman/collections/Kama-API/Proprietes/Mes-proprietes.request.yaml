$kind: http-request
name: Mes propriétés
method: GET
url: '{{baseUrl}}/api/properties/my-properties'
order: 3000
headers:
  - key: Authorization
    value: 'Bearer {{authToken}}'
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      pm.test("Status code is 200 OK", function () {
          pm.response.to.have.status(200);
      });

      pm.test("Response has success property", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('success', true);
      });

      pm.test("Response contains data array", function () {
          const jsonData = pm.response.json();
          pm.expect(jsonData).to.have.property('data');
          pm.expect(jsonData.data).to.be.an('array');
      });

      pm.test("All properties belong to current user", function () {
          const jsonData = pm.response.json();
          const userId = pm.collectionVariables.get("userId");
          if (jsonData.data && jsonData.data.length > 0 && userId) {
              jsonData.data.forEach(function(property) {
                  pm.expect(property.owner).to.equal(userId);
              });
          }
      });
